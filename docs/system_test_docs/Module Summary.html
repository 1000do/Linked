<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    body {
        font-family: Tahoma, Arial, sans-serif;
        font-size: 10pt;
    }
    table {
        border-collapse: collapse;
        width: 100%;
    }
    th, td {
        border: 1px solid black;
        padding: 5px;
        text-align: center;
    }
    th {
        background-color: #000080; /* Dark blue background similar to image */
        color: white;
        font-weight: bold;
    }
    td.left-align {
        text-align: left;
    }
    tr.sub-total {
        background-color: #000080;
        color: white;
        font-weight: bold;
    }
</style>
</head>
<body>

<table>
    <tr>
        <th>No</th>
        <th>Module code</th>
        <th>Passed</th>
        <th>Failed</th>
        <th>Pending</th>
        <th>N/A</th>
        <th>Number of test cases</th>
    </tr>
    <tr>
        <td>1</td>
        <td class="left-align">Manage User Report</td>
        <td>55</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>55</td>
    </tr>
    <tr>
        <td>2</td>
        <td class="left-align">Manage AI Service</td>
        <td>44</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>44</td>
    </tr>
    <tr>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
        <td>&nbsp;</td>
    </tr>
    <tr class="sub-total">
        <td></td>
        <td>Sub total</td>
        <td>99</td>
        <td>0</td>
        <td>0</td>
        <td>0</td>
        <td>99</td>
    </tr>
</table>

</body>
</html>
