  backend:
    build:
      context: .
      dockerfile: CourseMarketplaceBE/CourseMarketplaceBE/Dockerfile
    environment:
      ConnectionStrings__DefaultConnection: "Host=${DB_HOST};Port=${DB_PORT};Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}"
      AllowedOrigins: ${ALLOWED_ORIGINS}
      FrontendBaseUrl: ${FRONTEND_BASE_URL:-http://localhost:5208}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: "http://+:80"
      JWT_KEY: ${JWT_KEY}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_DURATION: ${JWT_DURATION}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_UPLOAD_PRESET: ${CLOUDINARY_UPLOAD_PRESET}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY}
      STRIPE_CONNECT_WEBHOOK_SECRET: ${STRIPE_CONNECT_WEBHOOK_SECRET}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_ENABLESSL: ${EMAIL_ENABLESSL}
      EMAIL_EMAIL: ${EMAIL_EMAIL}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "5207:80"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: CourseMarketplaceFE/CourseMarketplaceFE/Dockerfile
    environment:
      BackendApiUrl: "http://backend:80/api/"
      BackendBaseUrl: "http://backend:80"
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      Stripe__PublishableKey: ${STRIPE_PUBLISHABLE_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      ASPNETCORE_URLS: "http://+:80"
    ports:
      - "5208:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data: